<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Браузерный Ретро-Шутер (Мышь + Убийства + Эффекты)</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #000;
            color: #fff; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; user-select: none;
        }

        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
            image-rendering: pixelated; object-fit: cover;
            cursor: crosshair;
        }

        /* UI Интерфейс */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; z-index: 10;
        }

        .hud-top {
            display: flex; justify-content: space-between; padding: 20px;
            text-shadow: 2px 2px 0 #000; font-size: 24px; font-weight: bold;
        }

        .hud-bottom {
            display: flex; justify-content: center; padding: 20px;
            text-shadow: 2px 2px 0 #000; font-size: 18px; color: #aaa;
        }

        #health { color: #ff3333; }
        #kills { color: #33ff33; }
        #ammo { color: #ffcc00; }
        
        #damage-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0); pointer-events: none; z-index: 5;
            transition: background 0.1s;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(0, 255, 0, 0.7);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        /* Экраны (Пауза, Конец игры, Победа) */
        .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 20; pointer-events: auto;
        }
        
        #pause-screen { background: rgba(0,0,0,0.6); }
        #message-screen, #win-screen { display: none; }
        
        .title-text { font-size: 48px; margin-bottom: 20px; text-transform: uppercase; }
        .red-text { color: #ff3333; text-shadow: 3px 3px 0 #550000; }
        .green-text { color: #33ff33; text-shadow: 3px 3px 0 #005500; }
        .white-text { color: #ffffff; text-shadow: 3px 3px 0 #555555; }
        
        button {
            padding: 15px 30px; font-size: 20px; font-family: 'Courier New', Courier, monospace;
            background: #ffcc00; color: #000; border: 4px solid #fff; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #fff; transform: scale(1.05); }
        .hint { margin-top: 15px; color: #aaa; font-size: 16px; }

    </style>
</head>
<body>

    <div id="damage-overlay"></div>
    <div id="ui-layer">
        <div class="hud-top">
            <div id="health">ЗДОРОВЬЕ: 100</div>
            <div id="kills">УБИТО: 0/0</div>
            <div id="ammo">ПАТРОНЫ: 8/8</div>
        </div>
        <div class="hud-bottom">
            [W,A,S,D] - Ходьба | [Мышь] - Обзор | [ЛКМ] - Стрелять | [R] - Перезарядка
        </div>
    </div>
    
    <div id="crosshair"></div>

    <!-- Экран паузы (для захвата мыши) -->
    <div id="pause-screen" class="overlay-screen">
        <div class="title-text white-text">ИГРА НА ПАУЗЕ</div>
        <button id="btn-start">Кликните, чтобы играть</button>
        <div class="hint">Нажмите ESC, чтобы выйти в меню паузы</div>
    </div>

    <!-- Экран смерти -->
    <div id="message-screen" class="overlay-screen">
        <div class="title-text red-text">ВЫ ПОГИБЛИ</div>
        <button onclick="location.reload()">Начать заново</button>
    </div>

    <!-- Экран победы -->
    <div id="win-screen" class="overlay-screen">
        <div class="title-text green-text">СЕКТОР ЗАЧИЩЕН!</div>
        <button onclick="location.reload()">Играть снова</button>
    </div>

    <canvas id="gameCanvas" width="320" height="240"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const screenWidth = canvas.width;
        const screenHeight = canvas.height;

        // UI Элементы
        const hpEl = document.getElementById('health');
        const ammoEl = document.getElementById('ammo');
        const killsEl = document.getElementById('kills');
        const dmgOverlay = document.getElementById('damage-overlay');
        const pauseScreen = document.getElementById('pause-screen');
        const msgScreen = document.getElementById('message-screen');
        const winScreen = document.getElementById('win-screen');

        let isPaused = true;

        // --- ГЕНЕРАЦИЯ ТЕКСТУР ---
        const texWidth = 64; const texHeight = 64; const textures = [];
        function createTexture(generatorFunc) {
            const c = document.createElement('canvas');
            c.width = texWidth; c.height = texHeight;
            generatorFunc(c.getContext('2d'));
            return c;
        }

        textures[1] = createTexture(cx => { // Кирпич
            cx.fillStyle = '#8B0000'; cx.fillRect(0,0,64,64);
            cx.fillStyle = '#4a0000';
            for(let y=0; y<64; y+=16) {
                cx.fillRect(0, y, 64, 2);
                for(let x=0; x<64; x+=16) cx.fillRect(x + (y%32===0?0:8), y, 2, 16);
            }
        });
        textures[2] = createTexture(cx => { // Металл
            cx.fillStyle = '#555'; cx.fillRect(0,0,64,64);
            cx.fillStyle = '#333'; cx.fillRect(0,0,64,4); cx.fillRect(0,60,64,4);
            cx.fillRect(0,0,4,64); cx.fillRect(60,0,4,64);
            cx.fillStyle = '#222'; cx.beginPath(); cx.arc(8,8,3,0,Math.PI*2); cx.fill();
            cx.beginPath(); cx.arc(56,56,3,0,Math.PI*2); cx.fill();
        });

        // Спрайты врагов разных типов
        function createEnemyTexture(baseColor) {
            return createTexture(cx => {
                cx.fillStyle = baseColor; cx.beginPath(); cx.arc(32,28,24,0,Math.PI*2); cx.fill();
                cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(32,24,12,0,Math.PI*2); cx.fill();
                cx.fillStyle = '#000'; cx.beginPath(); cx.arc(32,24,5,0,Math.PI*2); cx.fill();
                cx.fillStyle = '#222'; cx.fillRect(20, 40, 24, 8);
                cx.fillStyle = '#fff'; cx.fillRect(22, 40, 4, 4); cx.fillRect(28, 40, 4, 4); cx.fillRect(34, 40, 4, 4);
            });
        }
        
        const texEnemyRed = createEnemyTexture('#cc0000');
        const texEnemyGreen = createEnemyTexture('#00aa00');
        const texEnemyBlue = createEnemyTexture('#0000cc');
        
        const texEnemyHurt = createTexture(cx => {
            cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(32,28,24,0,Math.PI*2); cx.fill();
        });
        const texEnemyDead = createTexture(cx => {
            cx.fillStyle = '#8a0303'; cx.beginPath(); cx.ellipse(32, 56, 28, 8, 0, 0, Math.PI*2); cx.fill();
            cx.fillStyle = '#520101'; cx.beginPath(); cx.ellipse(32, 54, 15, 5, 0, 0, Math.PI*2); cx.fill();
        });

        // Функция выбора текстуры в зависимости от состояния и типа
        function getEnemyTexture(enemy) {
            if (enemy.state === 'dead') return texEnemyDead;
            if (enemy.hurtTimer > 0) return texEnemyHurt;
            if (enemy.type === 'green') return texEnemyGreen;
            if (enemy.type === 'blue') return texEnemyBlue;
            return texEnemyRed;
        }

        // --- ПРОЦЕДУРНАЯ ГЕНЕРАЦИЯ КАРТЫ ---
        const mapWidth = 24; const mapHeight = 24;
        const worldMap = Array.from({length: mapHeight}, () => Array(mapWidth).fill(1));
        let floorCells = [];
        
        // Алгоритм "Случайное блуждание" (Drunkard's walk)
        let px = Math.floor(mapWidth/2), py = Math.floor(mapHeight/2);
        worldMap[py][px] = 0;
        floorCells.push({x: px, y: py});
        let carved = 1;
        
        while(carved < 250) {
            let dir = Math.floor(Math.random()*4);
            if(dir === 0 && py > 2) py--;
            else if(dir === 1 && py < mapHeight-3) py++;
            else if(dir === 2 && px > 2) px--;
            else if(dir === 3 && px < mapWidth-3) px++;
            
            if (worldMap[py][px] !== 0) {
                worldMap[py][px] = 0;
                floorCells.push({x: px, y: py});
                carved++;
            }
        }
        
        // Случайные текстуры для стен
        for(let y=1; y<mapHeight-1; y++) {
            for(let x=1; x<mapWidth-1; x++) {
                if(worldMap[y][x] > 0) worldMap[y][x] = Math.random() > 0.5 ? 1 : 2;
            }
        }

        // --- ИГРОК, ВРАГИ И ЧАСТИЦЫ ---
        const player = {
            x: floorCells[0].x + 0.5, y: floorCells[0].y + 0.5,
            dirX: 1.0, dirY: 0.0, planeX: 0.0, planeY: 0.66,
            hp: 100, maxHp: 100, ammo: 8, maxAmmo: 8, kills: 0,
            moveSpeed: 4.0, isShooting: false, shootTimer: 0,
            isReloading: false, reloadTimer: 0, weaponSway: 0,
            isDead: false, hasWon: false
        };

        const enemies = [];
        let enemyId = 0;
        for (let i = 0; i < 15; i++) { // Спавним ~15 врагов
            let cell = floorCells[Math.floor(Math.random() * floorCells.length)];
            // Не спавним слишком близко к игроку
            if (Math.abs(cell.x - player.x) < 4 && Math.abs(cell.y - player.y) < 4) continue;
            
            let typeRand = Math.random();
            let type = 'red', hp = 50, speed = 1.5, dmg = 15;
            if (typeRand > 0.7) { type = 'green'; hp = 100; speed = 0.8; dmg = 25; } // Танк
            else if (typeRand > 0.4) { type = 'blue'; hp = 30; speed = 2.5; dmg = 10; } // Быстрый
            
            enemies.push({
                id: ++enemyId, x: cell.x + 0.5, y: cell.y + 0.5,
                hp: hp, maxHp: hp, speed: speed, type: type, damage: dmg,
                state: 'idle', hurtTimer: 0, atkTimer: 0
            });
        }
        const totalEnemies = enemies.length;

        // Массивы для эффектов выстрела
        let projectiles = [];
        let particles = [];

        let ZBuffer = new Float64Array(screenWidth);
        let lastTime = performance.now();
        const keys = {};

        // --- УПРАВЛЕНИЕ (КЛАВИАТУРА И МЫШЬ) ---
        window.addEventListener('keydown', e => { 
            keys[e.code] = true;
            if (e.code === 'KeyR' && !player.isReloading && player.ammo < player.maxAmmo && !isPaused) {
                reloadWeapon();
            }
            if (e.code === 'Space' && !player.isDead && !isPaused) {
                shootWeapon();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Pointer Lock API (Захват мыши)
        document.getElementById('btn-start').addEventListener('click', () => {
            canvas.requestPointerLock();
        });
        canvas.addEventListener('mousedown', (e) => {
            if (player.isDead || player.hasWon) return;
            if (document.pointerLockElement !== canvas) {
                canvas.requestPointerLock();
            } else if (e.button === 0) {
                shootWeapon();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === canvas) {
                isPaused = false;
                pauseScreen.style.display = 'none';
                lastTime = performance.now();
            } else {
                isPaused = true;
                if (!player.isDead && !player.hasWon) pauseScreen.style.display = 'flex';
            }
        });

        // Движение мыши (Поворот камеры - ИСПРАВЛЕННАЯ ИНВЕРСИЯ)
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === canvas && !player.isDead && !player.hasWon && !isPaused) {
                // Положительный шаг для правильного направления вращения
                let rotStep = e.movementX * 0.003; 
                
                // Вращение векторов (Матрица поворота)
                let oldDirX = player.dirX;
                player.dirX = player.dirX * Math.cos(rotStep) - player.dirY * Math.sin(rotStep);
                player.dirY = oldDirX * Math.sin(rotStep) + player.dirY * Math.cos(rotStep);
                let oldPlaneX = player.planeX;
                player.planeX = player.planeX * Math.cos(rotStep) - player.planeY * Math.sin(rotStep);
                player.planeY = oldPlaneX * Math.sin(rotStep) + player.planeY * Math.cos(rotStep);
            }
        });

        // --- ИГРОВАЯ ЛОГИКА И ЭФФЕКТЫ ---
        function createParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*4,
                    vy: (Math.random()-0.5)*4,
                    life: 0.2 + Math.random()*0.3,
                    color: color,
                    isParticle: true
                });
            }
        }

        function updateParticles(dt) {
            for(let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                if(p.life <= 0) particles.splice(i, 1);
            }
        }

        function updateProjectiles(dt) {
            for(let i=projectiles.length-1; i>=0; i--) {
                let p = projectiles[i];
                p.x += p.dirX * p.speed * dt;
                p.y += p.dirY * p.speed * dt;
                
                // Столкновение со стеной
                let mapX = Math.floor(p.x); let mapY = Math.floor(p.y);
                if(worldMap[mapY] && worldMap[mapY][mapX] > 0) {
                    createParticles(p.x, p.y, '#ffffaa', 10); // Желтые искры
                    projectiles.splice(i, 1);
                    continue;
                }
                
                // Столкновение с врагом
                let hit = false;
                for(let enemy of enemies) {
                    if(enemy.state === 'dead') continue;
                    let dx = p.x - enemy.x; let dy = p.y - enemy.y;
                    if(dx*dx + dy*dy < 0.3) { // Радиус хитбокса
                        enemy.hp -= p.damage;
                        enemy.hurtTimer = 0.2;
                        enemy.state = 'chase'; // Агрится
                        
                        createParticles(p.x, p.y, '#cc0000', 15); // Брызги крови
                        
                        if(enemy.hp <= 0) {
                            enemy.hp = 0; enemy.state = 'dead';
                            player.kills++; checkWinCondition(); updateHUD();
                        }
                        hit = true;
                        break;
                    }
                }
                if(hit) projectiles.splice(i, 1);
            }
        }

        function reloadWeapon() {
            player.isReloading = true;
            player.reloadTimer = 1.0;
            updateHUD();
        }

        function shootWeapon() {
            if (player.isShooting || player.isReloading || player.isDead || player.hasWon || isPaused) return;
            if (player.ammo <= 0) { reloadWeapon(); return; }

            player.ammo--; player.isShooting = true; player.shootTimer = 0.15;
            updateHUD();

            // Создаем летящую пулю (снаряд)
            projectiles.push({
                x: player.x + player.dirX * 0.5,
                y: player.y + player.dirY * 0.5,
                dirX: player.dirX,
                dirY: player.dirY,
                speed: 30.0, // Высокая скорость полета
                damage: 35,
                isProjectile: true
            });
        }

        function checkWinCondition() {
            if (player.kills >= totalEnemies) {
                player.hasWon = true;
                document.exitPointerLock();
                winScreen.style.display = 'flex';
            }
        }

        function takeDamage(amt) {
            if (player.isDead || player.hasWon) return;
            player.hp -= amt;
            
            dmgOverlay.style.background = 'rgba(255, 0, 0, 0.4)';
            setTimeout(() => dmgOverlay.style.background = 'rgba(255, 0, 0, 0)', 100);

            if (player.hp <= 0) {
                player.hp = 0; player.isDead = true;
                document.exitPointerLock();
                msgScreen.style.display = 'flex';
            }
            updateHUD();
        }

        function updateHUD() {
            hpEl.innerText = `ЗДОРОВЬЕ: ${player.hp}`;
            killsEl.innerText = `УБИТО: ${player.kills}/${totalEnemies}`;
            
            if (player.isReloading) {
                ammoEl.innerText = `ПЕРЕЗАРЯДКА...`; ammoEl.style.color = '#ff3333';
            } else {
                ammoEl.innerText = `ПАТРОНЫ: ${player.ammo}/${player.maxAmmo}`;
                ammoEl.style.color = player.ammo === 0 ? '#ff3333' : '#ffcc00';
            }
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        function gameLoop() {
            const currentTime = performance.now();
            let dt = (currentTime - lastTime) / 1000.0;
            if (dt > 0.1) dt = 0.1;
            lastTime = currentTime;

            if (!isPaused && !player.isDead && !player.hasWon) {
                updatePlayer(dt);
                updateProjectiles(dt);
                updateParticles(dt);
                updateEnemies(dt);
            }
            
            drawWorld();
            drawSprites();
            if (!player.isDead) drawWeapon();

            requestAnimationFrame(gameLoop);
        }

        function updatePlayer(dt) {
            if (player.shootTimer > 0) {
                player.shootTimer -= dt;
                if (player.shootTimer <= 0) player.isShooting = false;
            }
            if (player.isReloading) {
                player.reloadTimer -= dt;
                if (player.reloadTimer <= 0) {
                    player.isReloading = false; player.ammo = player.maxAmmo; updateHUD();
                }
            }

            let moveStep = player.moveSpeed * dt;
            let isMoving = false;
            let newX = player.x; let newY = player.y;

            if (keys['KeyW']) { newX += player.dirX * moveStep; newY += player.dirY * moveStep; isMoving = true; }
            if (keys['KeyS']) { newX -= player.dirX * moveStep; newY -= player.dirY * moveStep; isMoving = true; }
            if (keys['KeyA']) { newX += player.dirY * moveStep; newY -= player.dirX * moveStep; isMoving = true; }
            if (keys['KeyD']) { newX -= player.dirY * moveStep; newY += player.dirX * moveStep; isMoving = true; }

            if (worldMap[Math.floor(player.y)][Math.floor(newX)] === 0) player.x = newX;
            if (worldMap[Math.floor(newY)][Math.floor(player.x)] === 0) player.y = newY;

            if (isMoving) player.weaponSway += dt * 10;
            else player.weaponSway = Math.sin(player.weaponSway) * 0.5;
        }

        function updateEnemies(dt) {
            for (let enemy of enemies) {
                if (enemy.state === 'dead') continue;
                if (enemy.hurtTimer > 0) enemy.hurtTimer -= dt;
                if (enemy.atkTimer > 0) enemy.atkTimer -= dt;

                let dx = player.x - enemy.x; let dy = player.y - enemy.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 8) enemy.state = 'chase'; // Агро-радиус

                if (enemy.state === 'chase') {
                    if (dist > 1.2) {
                        let stepX = (dx/dist) * enemy.speed * dt;
                        let stepY = (dy/dist) * enemy.speed * dt;
                        if (worldMap[Math.floor(enemy.y)][Math.floor(enemy.x + stepX)] === 0) enemy.x += stepX;
                        if (worldMap[Math.floor(enemy.y + stepY)][Math.floor(enemy.x)] === 0) enemy.y += stepY;
                    } else if (enemy.atkTimer <= 0) {
                        takeDamage(enemy.damage); enemy.atkTimer = 1.5;
                    }
                }
            }
        }

        function drawWorld() {
            let ceilingGrad = ctx.createLinearGradient(0, 0, 0, screenHeight/2);
            ceilingGrad.addColorStop(0, "#111"); ceilingGrad.addColorStop(1, "#333");
            ctx.fillStyle = ceilingGrad; ctx.fillRect(0, 0, screenWidth, screenHeight/2);
            
            let floorGrad = ctx.createLinearGradient(0, screenHeight/2, 0, screenHeight);
            floorGrad.addColorStop(0, "#222"); floorGrad.addColorStop(1, "#4d3319");
            ctx.fillStyle = floorGrad; ctx.fillRect(0, screenHeight/2, screenWidth, screenHeight/2);

            for (let x = 0; x < screenWidth; x++) {
                let cameraX = 2 * x / screenWidth - 1; 
                let rayDirX = player.dirX + player.planeX * cameraX;
                let rayDirY = player.dirY + player.planeY * cameraX;

                let mapX = Math.floor(player.x); let mapY = Math.floor(player.y);
                let sideDistX, sideDistY;
                let deltaDistX = Math.abs(1 / rayDirX); let deltaDistY = Math.abs(1 / rayDirY);
                let perpWallDist;
                let stepX, stepY, hit = 0, side;

                if (rayDirX < 0) { stepX = -1; sideDistX = (player.x - mapX) * deltaDistX; } 
                else { stepX = 1; sideDistX = (mapX + 1.0 - player.x) * deltaDistX; }
                if (rayDirY < 0) { stepY = -1; sideDistY = (player.y - mapY) * deltaDistY; } 
                else { stepY = 1; sideDistY = (mapY + 1.0 - player.y) * deltaDistY; }

                while (hit === 0) {
                    if (sideDistX < sideDistY) { sideDistX += deltaDistX; mapX += stepX; side = 0; } 
                    else { sideDistY += deltaDistY; mapY += stepY; side = 1; }
                    
                    if (mapY >= 0 && mapY < mapHeight && mapX >= 0 && mapX < mapWidth) {
                        if (worldMap[mapY][mapX] > 0) hit = 1;
                    } else hit = 1;
                }

                if (side === 0) perpWallDist = (sideDistX - deltaDistX);
                else            perpWallDist = (sideDistY - deltaDistY);

                ZBuffer[x] = perpWallDist;

                let lineHeight = Math.floor(screenHeight / perpWallDist);
                let drawStart = -lineHeight / 2 + screenHeight / 2;
                if (drawStart < 0) drawStart = 0;
                let drawEnd = lineHeight / 2 + screenHeight / 2;
                if (drawEnd >= screenHeight) drawEnd = screenHeight - 1;

                let texNum = worldMap[mapY][mapX] || 1;
                let wallX;
                if (side === 0) wallX = player.y + perpWallDist * rayDirY;
                else            wallX = player.x + perpWallDist * rayDirX;
                wallX -= Math.floor(wallX);

                let texX = Math.floor(wallX * texWidth);
                if (side === 0 && rayDirX > 0) texX = texWidth - texX - 1;
                if (side === 1 && rayDirY < 0) texX = texWidth - texX - 1;

                ctx.drawImage(textures[texNum], texX, 0, 1, texHeight, x, drawStart, 1, drawEnd - drawStart);

                let shadow = perpWallDist * 0.08;
                if (side === 1) shadow += 0.3;
                if (shadow > 1) shadow = 1;
                ctx.fillStyle = `rgba(0, 0, 0, ${shadow})`; ctx.fillRect(x, drawStart, 1, drawEnd - drawStart);
            }
        }

        // Отрисовка всех объектов: враги, снаряды, частицы
        function drawSprites() {
            let entities = [...enemies, ...projectiles, ...particles];
            
            entities.sort((a,b) => {
                return ((player.x - b.x)**2 + (player.y - b.y)**2) - ((player.x - a.x)**2 + (player.y - a.y)**2);
            });

            for (let i = 0; i < entities.length; i++) {
                let ent = entities[i];
                let spriteX = ent.x - player.x; let spriteY = ent.y - player.y;

                let invDet = 1.0 / (player.planeX * player.dirY - player.dirX * player.planeY);
                let transformX = invDet * (player.dirY * spriteX - player.dirX * spriteY);
                let transformY = invDet * (-player.planeY * spriteX + player.planeX * spriteY);

                if (transformY > 0) {
                    let spriteScreenX = Math.floor((screenWidth / 2) * (1 + transformX / transformY));
                    
                    let vMove = 0;
                    if(ent.state === 'dead') vMove = 64;
                    else if(ent.hp) vMove = Math.sin(performance.now()/200)*10;
                    
                    let vMoveScreen = Math.floor(vMove / transformY);

                    // Масштабирование размера (Враг = 1, Пуля = 0.1, Искры = 0.05)
                    let isSprite = !ent.isParticle && !ent.isProjectile;
                    let sizeMult = isSprite ? 1.0 : (ent.isProjectile ? 0.15 : 0.05);

                    let spriteHeight = Math.abs(Math.floor(screenHeight / transformY)) * sizeMult;
                    let drawStartY = -spriteHeight / 2 + screenHeight / 2 + vMoveScreen;
                    let drawEndY = spriteHeight / 2 + screenHeight / 2 + vMoveScreen;

                    let spriteWidth = Math.abs(Math.floor(screenHeight / transformY)) * sizeMult;
                    let drawStartX = -spriteWidth / 2 + spriteScreenX;
                    let drawEndX = spriteWidth / 2 + spriteScreenX;

                    let clipStartX = Math.max(0, drawStartX);
                    let clipEndX = Math.min(screenWidth - 1, drawEndX);

                    if (isSprite) {
                        let tex = getEnemyTexture(ent);
                        for (let stripe = clipStartX; stripe < clipEndX; stripe++) {
                            let texX = Math.floor(256 * (stripe - (-spriteWidth / 2 + spriteScreenX)) * texWidth / spriteWidth) / 256;
                            if (transformY < ZBuffer[Math.floor(stripe)]) {
                                ctx.drawImage(tex, texX, 0, 1, texHeight, stripe, drawStartY, 1, drawEndY - drawStartY);
                            }
                        }
                    } else if (ent.isProjectile) {
                        ctx.fillStyle = '#ffff00'; // Желтая пуля
                        for (let stripe = clipStartX; stripe < clipEndX; stripe++) {
                            if (transformY < ZBuffer[Math.floor(stripe)]) {
                                ctx.fillRect(stripe, drawStartY, 1, drawEndY - drawStartY);
                            }
                        }
                    } else if (ent.isParticle) {
                        ctx.fillStyle = ent.color; // Искры/Кровь
                        for (let stripe = clipStartX; stripe < clipEndX; stripe++) {
                            if (transformY < ZBuffer[Math.floor(stripe)]) {
                                ctx.fillRect(stripe, drawStartY, 1, drawEndY - drawStartY);
                            }
                        }
                    }
                }
            }
        }

        function drawWeapon() {
            let swayX = Math.cos(player.weaponSway) * 10;
            let swayY = Math.abs(Math.sin(player.weaponSway)) * 10;
            let gunX = screenWidth / 2 + swayX; let gunY = screenHeight + swayY;

            if (player.isReloading) gunY += 150 * Math.sin((1 - player.reloadTimer) * Math.PI); 

            if (player.isShooting) {
                gunY += 20; gunX += 5;
                // Вспышка на весь экран
                ctx.fillStyle = 'rgba(255, 255, 200, 0.3)'; ctx.fillRect(0, 0, screenWidth, screenHeight);
                
                // Вспышка пламени из ствола
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath(); ctx.arc(gunX - 5, gunY - 90, 20 + Math.random()*15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(gunX - 5, gunY - 90, 10 + Math.random()*5, 0, Math.PI*2); ctx.fill();
            }

            // Отрисовка дробовика
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.moveTo(gunX - 30, gunY); ctx.lineTo(gunX - 20, gunY - 80); ctx.lineTo(gunX, gunY - 80); ctx.lineTo(gunX, gunY); ctx.fill();
            ctx.fillStyle = '#2a2a2a';
            ctx.beginPath(); ctx.moveTo(gunX, gunY); ctx.lineTo(gunX, gunY - 80); ctx.lineTo(gunX + 20, gunY - 80); ctx.lineTo(gunX + 30, gunY); ctx.fill();
            ctx.fillStyle = '#555'; ctx.fillRect(gunX - 15, gunY - 78, 5, 78); ctx.fillRect(gunX + 5, gunY - 78, 5, 78);
            ctx.fillStyle = '#000'; ctx.fillRect(gunX - 20, gunY - 80, 40, 5);
        }

        // Запуск
        updateHUD();
        requestAnimationFrame(gameLoop);

    </script>
